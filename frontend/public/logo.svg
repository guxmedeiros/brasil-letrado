<svg viewBox="160 50 360 360" xmlns="http://www.w3.org/2000/svg">
<title>Ícone Brasil Letrado</title>
<style>
.bg-badge { fill:#FDF6E3; }
.ring { fill:none; stroke:#1E5631; stroke-width:4; }
.page { fill:#F5A623; stroke:#1E5631; stroke-width:2; }
.spine { stroke:#1E5631; stroke-width:2; }
.line { stroke:#1E5631; stroke-width:1.5; opacity:0.55; }
.lens { fill:none; stroke:#1E3A5F; stroke-width:5; }
.bridge { stroke:#1E3A5F; stroke-width:5; }
.temple { stroke:#1E3A5F; stroke-width:5; stroke-linecap:round; }
</style>

<circle class="bg-badge" cx="340" cy="230" r="175"/>
<circle class="ring" cx="340" cy="230" r="175"/>

<line class="spine" x1="340" y1="205" x2="340" y2="285"/>
<polygon class="page" points="340,205 225,222 225,300 340,285"/>
<polygon class="page" points="340,205 455,222 455,300 340,285"/>

<line class="line" x1="250" y1="240" x2="320" y2="235"/>
<line class="line" x1="250" y1="255" x2="318" y2="252"/>
<line class="line" x1="250" y1="270" x2="316" y2="268"/>
<line class="line" x1="360" y1="235" x2="430" y2="240"/>
<line class="line" x1="362" y1="252" x2="430" y2="255"/>
<line class="line" x1="364" y1="268" x2="430" y2="270"/>

<line class="bridge" x1="305" y1="190" x2="375" y2="190"/>
<circle class="lens" cx="290" cy="192" r="26"/>
<circle class="lens" cx="390" cy="192" r="26"/>
<line class="temple" x1="264" y1="192" x2="240" y2="185"/>
<line class="temple" x1="416" y1="192" x2="440" y2="185"/>
</svg>
